<!DOCTYPE html>
<html>
<head>
    <title>SMS Testing Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
        }

        header {
            background: #020617;
            padding: 20px;
            display: flex;
            justify-content: space-between;
        }

        h1 {
            color: #22c55e;
        }

        h2 {
            margin-top: 30px;
        }

        .container {
            padding: 20px;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-right: 10px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: black;
            cursor: pointer;
        }

        .card {
            background: #020617;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .pass { border-left: 4px solid #22c55e; }
        .fail { border-left: 4px solid #ef4444; }
        .pending { border-left: 4px solid #64748b; }

        .otp {
            color: #facc15;
            font-weight: bold;
        }

        .small {
            font-size: 12px;
            color: #64748b;
        }

        .device {
            border-left: 4px solid #22c55e;
        }
    </style>
</head>

<body>

<header>
    <h1>📩 SMS Testing Dashboard</h1>
</header>

<div class="container">

    <!-- 📱 DEVICE ONLINE -->
    <h2>📱 Device Online</h2>
    <div id="devices"></div>

    <!-- 📩 SMS -->
    <h2>📨 SMS</h2>
    <div id="sms"></div>

    <!-- 🧪 TEST -->
    <h2>🧪 Test SMS</h2>

    <input id="expected" placeholder="Testo atteso (es: OTP)">
    <select id="simSelect"></select>

    <button onclick="createTest()">Crea Test</button>

    <div id="tests"></div>

</div>

<script>
const API = "https://sms-backend-jp2t.onrender.com";

// 🔐 evidenzia OTP
function highlightOTP(text) {
    return text.replace(/\b\d{4,6}\b/g, m => `<span class="otp">${m}</span>`);
}

// 📱 DEVICE ONLINE
async function loadDevices() {
    try {
        const res = await fetch(API + "/devices-online");
        const data = await res.json();

        const container = document.getElementById("devices");
        container.innerHTML = "";

        data.forEach(d => {
            const div = document.createElement("div");
            div.className = "card device";

            div.innerHTML = `
                📱 <b>${d.deviceId}</b><br>
                <span class="small">${d.simId}</span>
            `;

            container.appendChild(div);
        });

    } catch (e) {
        console.log("Errore devices:", e);
    }
}

// 📩 SMS
async function loadSMS() {
    const res = await fetch(API + "/sms");
    const data = await res.json();

    const container = document.getElementById("sms");
    container.innerHTML = "";

    data.slice().reverse().forEach(sms => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${sms.sender}</b><br>
            ${highlightOTP(sms.message)}<br>
            <span class="small">${new Date(sms.timestamp).toLocaleString()}</span><br>
            <span class="small">SIM: ${sms.simId}</span>
        `;

        container.appendChild(div);
    });
}

// 📶 SIM
async function loadSims() {
    const res = await fetch(API + "/sims");
    const data = await res.json();

    const select = document.getElementById("simSelect");
    select.innerHTML = "";

    data.forEach(sim => {
        const opt = document.createElement("option");
        opt.value = sim.simId;
        opt.innerText = sim.phoneNumber + " (" + sim.deviceId + ")";
        select.appendChild(opt);
    });
}

// 🧪 CREA TEST
async function createTest() {
    const expected = document.getElementById("expected").value;
    const simId = document.getElementById("simSelect").value;

    if (!expected || !simId) {
        alert("Inserisci testo e seleziona SIM");
        return;
    }

    await fetch(API + "/test", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ expected, simId })
    });

    document.getElementById("expected").value = "";
}

// 🎯 TEST UI
function renderTests(data) {
    const container = document.getElementById("tests");
    container.innerHTML = "";

    data.slice().reverse().forEach(test => {
        const div = document.createElement("div");

        let cls = "pending";
        let status = "⏳ PENDING";

        if (test.status === "PASS") {
            cls = "pass";
            status = "✅ PASS";
        }

        if (test.status === "FAIL") {
            cls = "fail";
            status = "❌ FAIL";
        }

        div.className = "card " + cls;

        div.innerHTML = `
            <b>${test.expected}</b><br>
            ${status}<br>
            <span class="small">SIM: ${test.simId}</span><br>
            <span class="small">Creato: ${new Date(test.createdAt).toLocaleTimeString()}</span>
        `;

        container.appendChild(div);
    });
}

// 📊 TEST LOAD
async function loadTests() {
    const res = await fetch(API + "/tests");
    const data = await res.json();
    renderTests(data);
}

// 🔄 REFRESH
setInterval(() => {
    loadSMS();
    loadTests();
    loadDevices();
}, 2000);

// INIT
loadSMS();
loadTests();
loadSims();
loadDevices();
</script>

</body>
</html>
