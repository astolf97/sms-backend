<!DOCTYPE html>
<html>
<head>
    <title>SMS Testing Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
        }

        header {
            background: #020617;
            padding: 20px;
            display: flex;
            justify-content: space-between;
        }

        h1 { color: #22c55e; }
        h2 { margin-top: 30px; }

        .container { padding: 20px; }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-right: 10px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: black;
            cursor: pointer;
        }

        .card {
            background: #020617;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .pass { border-left: 4px solid #22c55e; }
        .fail { border-left: 4px solid #ef4444; }
        .pending { border-left: 4px solid #64748b; }

        .otp { color: #facc15; font-weight: bold; }
        .small { font-size: 12px; color: #64748b; }
        .device { border-left: 4px solid #22c55e; }
    </style>
</head>

<body>

<header>
    <h1>📩 SMS Testing Dashboard</h1>
</header>

<div class="container">

    <!-- 📱 DEVICE ONLINE -->
    <h2>📱 Device Online</h2>
    <div id="devices"></div>

    <!-- 📩 SMS -->
    <h2>📨 SMS</h2>
    <div id="sms"></div>

    <!-- 🧪 TEST -->
    <h2>🧪 Test SMS</h2>

    <input id="expected" placeholder="Testo atteso (es: OTP)">
    <select id="simSelect"></select>

    <button onclick="createTest()">Crea Test</button>

    <div id="tests"></div>

</div>

<script>
const API = "https://sms-backend-jp2t.onrender.com";

// OTP highlight
function highlightOTP(text) {
    return text.replace(/\b\d{4,6}\b/g, m => `<span class="otp">${m}</span>`);
}

//
// 📱 DEVICE + SIM
//
async function loadDevices() {
    try {
        const res = await fetch(API + "/devices-online");
        const data = await res.json();

        const container = document.getElementById("devices");
        const select = document.getElementById("simSelect");

        container.innerHTML = "";
        select.innerHTML = "";

        data.forEach(device => {

            // UI lista device
            const div = document.createElement("div");
            div.className = "card device";

            let simsHtml = "";

            device.sims?.forEach(sim => {
                simsHtml += `SIM ${sim.slot + 1} - ${sim.carrier}<br>`;

                // 🔥 SELECT PER TEST
                const opt = document.createElement("option");

                opt.value = JSON.stringify({
                    deviceId: device.deviceId,
                    simSlot: sim.slot
                });

                opt.innerText = `📱 ${device.model} | SIM ${sim.slot + 1} (${sim.carrier})`;

                select.appendChild(opt);
            });

            div.innerHTML = `
                <b>${device.model}</b><br>
                <span class="small">${device.deviceId}</span><br>
                <span class="small">${simsHtml}</span>
            `;

            container.appendChild(div);
        });

    } catch (e) {
        console.log("Errore devices:", e);
    }
}

//
// 📩 SMS
//
async function loadSMS() {
    const res = await fetch(API + "/sms");
    const data = await res.json();

    const container = document.getElementById("sms");
    container.innerHTML = "";

    data.slice().reverse().forEach(sms => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${sms.sender}</b><br>
            ${highlightOTP(sms.message)}<br>
            <span class="small">${new Date(sms.timestamp).toLocaleString()}</span><br>
            <span class="small">SIM: ${sms.simId}</span>
        `;

        container.appendChild(div);
    });
}

//
// 🧪 CREA TEST
//
async function createTest() {

    const expected = document.getElementById("expected").value;

    const selected = JSON.parse(
        document.getElementById("simSelect").value
    );

    if (!expected) {
        alert("Inserisci testo");
        return;
    }

    await fetch(API + "/test", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            expected,
            deviceId: selected.deviceId,
            simSlot: selected.simSlot
        })
    });

    document.getElementById("expected").value = "";
}

//
// 🎯 TEST UI
//
function renderTests(data) {
    const container = document.getElementById("tests");
    container.innerHTML = "";

    data.slice().reverse().forEach(test => {

        let cls = "pending";
        let status = "⏳ PENDING";

        if (test.status === "PASS") {
            cls = "pass";
            status = "✅ PASS";
        }

        if (test.status === "FAIL") {
            cls = "fail";
            status = "❌ FAIL";
        }

        const div = document.createElement("div");
        div.className = "card " + cls;

        div.innerHTML = `
            <b>${test.expected}</b><br>
            ${status}<br>
            <span class="small">📱 ${test.deviceId} | SIM ${test.simSlot + 1}</span><br>
            <span class="small">Creato: ${new Date(test.createdAt).toLocaleTimeString()}</span>
        `;

        container.appendChild(div);
    });
}

//
// 📊 LOAD TEST
//
async function loadTests() {
    const res = await fetch(API + "/tests");
    const data = await res.json();
    renderTests(data);
}

//
// 🔄 REFRESH
//
setInterval(() => {
    loadSMS();
    loadTests();
    loadDevices();
}, 2000);

//
// INIT
//
loadSMS();
loadTests();
loadDevices();
</script>

</body>
</html>
