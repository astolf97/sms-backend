<!DOCTYPE html>
<html>
<head>
    <title>SMS Testing Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
        }

        header {
            background: #020617;
            padding: 20px;
            display: flex;
            justify-content: space-between;
        }

        h1 { color: #22c55e; }
        h2 { margin-top: 30px; }

        .container { padding: 20px; }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-right: 10px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: black;
            cursor: pointer;
        }

        .card {
            background: #020617;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .pass { border-left: 4px solid #22c55e; }
        .fail { border-left: 4px solid #ef4444; }
        .pending { border-left: 4px solid #64748b; }

        .otp { color: #facc15; font-weight: bold; }
        .small { font-size: 12px; color: #64748b; }
        .device { border-left: 4px solid #22c55e; }
    </style>
</head>

<body>

<header>
    <h1>📩 SMS Testing Dashboard</h1>
</header>

<div class="container">

    <!-- 📱 DEVICE ONLINE -->
    <h2>📱 Device Online</h2>
    <div id="devices"></div>

    <!-- 📩 SMS -->
    <h2>📨 SMS</h2>
    <div id="sms"></div>

    <!-- 🧪 TEST -->
    <h2>🧪 Test SMS</h2>

    <input id="expected" placeholder="Testo atteso (es: OTP)">
    <select id="simSelect"></select>

    <button onclick="createTest()">Crea Test</button>

    <div id="tests"></div>

</div>

<script>
const API = "https://sms-backend-jp2t.onrender.com";

// 🔥 debounce save
let typingTimeout;

function saveSimLabel(deviceId, simId, label) {
    clearTimeout(typingTimeout);

    typingTimeout = setTimeout(async () => {
        await fetch(API + "/set-sim-label", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ deviceId, simId, label })
        });

        console.log("✅ Label salvata:", simId, label);
    }, 500);
}

// OTP highlight
function highlightOTP(text) {
    return text.replace(/\b\d{4,6}\b/g, m => `<span class="otp">${m}</span>`);
}

//
// 📱 DEVICE + SIM (NON in loop)
//
async function loadDevices() {
    const res = await fetch(API + "/devices-online");
    const data = await res.json();

    const container = document.getElementById("devices");
    container.innerHTML = "";

    data.forEach(d => {

        const div = document.createElement("div");
        div.className = "card device";

        let simsHtml = "";

        d.sims.forEach(sim => {

            const key = `${d.deviceId}-${sim.simId}`;
            const existingInput = document.getElementById(`input-${key}`);

            let value = sim.label || "";

            // 🔥 se stai editando → NON toccare
            if (editing && editingKey === key && existingInput) {
                value = existingInput.value;
            }

            simsHtml += `
                <div style="margin-top:10px; padding:8px; background:#020617; border-radius:6px;">
                    <b>${sim.simId}</b><br>

                    <div style="display:flex; gap:6px; margin-top:5px;">
                        <input 
                            id="input-${key}"
                            placeholder="Numero SIM..."
                            value="${value}"
                            onfocus="startEditing('${key}')"
                        >

                        <button onclick="manualSave('${d.deviceId}', '${sim.simId}', '${key}')">
                            💾
                        </button>
                    </div>
                </div>
            `;
        });

        div.innerHTML = `
            📱 <b>${d.deviceId}</b><br>
            <span class="small">${d.model}</span><br>
            ${simsHtml}
        `;

        container.appendChild(div);
    });
}

//
// 📩 SMS (loop ok)
//
async function loadSMS() {
    const res = await fetch(API + "/sms");
    const data = await res.json();

    const container = document.getElementById("sms");
    container.innerHTML = "";

    data.slice().reverse().forEach(sms => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${sms.sender}</b><br>
            ${highlightOTP(sms.message)}<br>
            <span class="small">${new Date(sms.timestamp).toLocaleString()}</span><br>
            <span class="small">SIM: ${getSimLabel(sms.deviceId, sms.simId)}</span>
        `;

        container.appendChild(div);
    });
}

//
// 📶 SIM CACHE
//
let simsCache = [];

async function loadSimsCache() {
    const res = await fetch(API + "/sims");
    simsCache = await res.json();
}

function getSimLabel(deviceId, simId) {
    const sim = simsCache.find(
        s => s.deviceId === deviceId && s.simId === simId
    );

    return sim?.label || simId;
}


let editing = false;
let editingKey = null; // 👈 quale input stai modificando

function startEditing() {
    editing = true;
}

async function manualSave(deviceId, simId, key) {

    const input = document.getElementById(`input-${key}`);
    const label = input.value;

    await fetch(API + "/set-sim-label", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ deviceId, simId, label })
    });

    console.log("✅ Salvato:", simId, label);

    // 🔥 reset editing
    editing = false;
    editingKey = null;

    await loadDevices();
}

//
// 🧪 TEST
//
async function createTest() {

    const expected = document.getElementById("expected").value;

    const selected = JSON.parse(
        document.getElementById("simSelect").value
    );

    if (!expected) {
        alert("Inserisci testo");
        return;
    }

    await fetch(API + "/test", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            expected,
            deviceId: selected.deviceId,
            simId: selected.simId
        })
    });

    document.getElementById("expected").value = "";
}


function renderTests(data) {
    const container = document.getElementById("tests");
    container.innerHTML = "";

    data.slice().reverse().forEach(test => {

        let cls = "pending";
        let status = "⏳ PENDING";

        if (test.status === "PASS") {
            cls = "pass";
            status = "✅ PASS";
        }

        if (test.status === "FAIL") {
            cls = "fail";
            status = "❌ FAIL";
        }

        const div = document.createElement("div");
        div.className = "card " + cls;

        div.innerHTML = `
            <b>${test.expected}</b><br>
            ${status}<br>
            <span class="small">📱 ${test.deviceId} | SIM ${test.simId}</span><br>
            <span class="small">Creato: ${new Date(test.createdAt).toLocaleTimeString()}</span>
        `;

        container.appendChild(div);
    });
}

function startEditing(key) {
    editing = true;
    editingKey = key;
}

async function loadTests() {
    const res = await fetch(API + "/tests");
    const data = await res.json();
    renderTests(data);
}

//
// 📶 SELECT SIM
//
async function loadSimSelect() {
    const res = await fetch(API + "/sims");
    const data = await res.json();

    const select = document.getElementById("simSelect");
    select.innerHTML = "";

    data.forEach(sim => {

        const opt = document.createElement("option");

        opt.value = JSON.stringify({
            deviceId: sim.deviceId,
            simId: sim.simId
        });

        opt.innerText = `${sim.label || sim.simId} (${sim.deviceId})`;

        select.appendChild(opt);
    });
}

//
// 🔄 REFRESH (SOLO DATI)
//
setInterval(async () => {

    if (editing) return; // 🔥 BLOCCO TOTALE

    await loadSMS();
    await loadTests();
    await loadSimsCache();
    await loadSimSelect();

}, 2000);

//
// 🔄 DEVICE REFRESH LENTO
//
setInterval(loadDevices, 8000);

//
// 🚀 INIT
//
async function init() {
    await loadDevices();
    await loadSimsCache();
    await loadSimSelect();
    await loadSMS();
    await loadTests();
}

init();

</script>

</body>
</html>
