<!DOCTYPE html>
<html>
<head>
    <title>SMS Testing Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
        }

        header {
            background: #020617;
            padding: 20px;
            display: flex;
            justify-content: space-between;
        }

        h1 {
            color: #22c55e;
        }

        .container {
            padding: 20px;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-right: 10px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: black;
            cursor: pointer;
        }

        .sms, .test {
            background: #020617;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .pass { border-left: 4px solid #22c55e; }
        .fail { border-left: 4px solid #ef4444; }
        .pending { border-left: 4px solid #64748b; }

        .otp {
            color: #facc15;
            font-weight: bold;
        }

        .small {
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>

<body>

<header>
    <h1>📩 SMS + Testing Dashboard</h1>
</header>

<div class="container">

    <h2>📨 SMS</h2>
    <div id="sms"></div>

    <h2>🧪 Test SMS</h2>

    <input id="expected" placeholder="Testo atteso (es: OTP)">
    <button onclick="createTest()">Crea Test</button>

    <div id="tests"></div>

</div>

<script>
const API = "https://sms-backend-jp2t.onrender.com";

// evidenzia OTP
function highlightOTP(text) {
    return text.replace(/\b\d{4,6}\b/g, m => `<span class="otp">${m}</span>`);
}

// 📩 SMS
async function loadSMS() {
    const res = await fetch(API + "/sms");
    const data = await res.json();

    const container = document.getElementById("sms");
    container.innerHTML = "";

    data.slice().reverse().forEach(sms => {
        const div = document.createElement("div");
        div.className = "sms";

        div.innerHTML = `
            <b>${sms.sender}</b><br>
            ${highlightOTP(sms.message)}<br>
            <span class="small">${new Date(sms.timestamp).toLocaleString()}</span>
        `;

        container.appendChild(div);
    });
}

// 🧪 TEST
async function createTest() {
    const expected = document.getElementById("expected").value;

    await fetch(API + "/test", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ expected })
    });

    document.getElementById("expected").value = "";
}

function renderTests(data) {
    const container = document.getElementById("tests");
    container.innerHTML = "";

    data.slice().reverse().forEach(test => {
        const div = document.createElement("div");

        let cls = "pending";
        let status = "⏳ PENDING";

        if (test.status === "PASS") {
            cls = "pass";
            status = "✅ PASS";
        }

        if (test.status === "FAIL") {
            cls = "fail";
            status = "❌ FAIL";
        }

        div.className = "test " + cls;

        div.innerHTML = `
            <b>${test.expected}</b><br>
            ${status}<br>
            <span class="small">
                creato: ${new Date(test.createdAt).toLocaleTimeString()}
            </span>
        `;

        container.appendChild(div);
    });
}

async function loadTests() {
    const res = await fetch(API + "/tests");
    const data = await res.json();
    renderTests(data);
}

// refresh continuo
setInterval(() => {
    loadSMS();
    loadTests();
}, 2000);

loadSMS();
loadTests();
</script>

</body>
</html>
